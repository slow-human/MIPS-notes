        { id: 78, unit: 8, sentence: 'However, like most things between Ukraine and Russia, the details of the extension were <u>fraught</u> and tension-filled.', translation: '延期细节充满紧张和冲突。', options: ['fraud', 'frail', 'fright', 'distressed'], options_meaning: ['欺诈', '脆弱的', '惊吓', '焦虑的'], answer: 3 }
    ];

    // DOM & 状态
    const container = document.getElementById('question-list');
    const filter = document.getElementById('unit-filter');
    const totalSpan = document.getElementById('total-count');
    const completedSpan = document.getElementById('completed-count');
    const correctSpan = document.getElementById('correct-count');
    const wrongCountSpan = document.getElementById('wrong-count');
    const btnAll = document.getElementById('btn-all');
    const btnWrong = document.getElementById('btn-wrong');

    let answeredQuestions = {};
    let wrongIds = new Set();
    let currentMode = 'all';

    totalSpan.textContent = questions.length;

    function renderQuestions() {
        const selectedUnit = filter.value;
        let displayQuestions = questions;

        if (selectedUnit !== 'all') {
            displayQuestions = displayQuestions.filter(q => q.unit === parseInt(selectedUnit));
        }

        if (currentMode === 'wrong') {
            displayQuestions = displayQuestions.filter(q => wrongIds.has(q.id));
        }

        container.innerHTML = '';
        if (displayQuestions.length === 0) {
            container.innerHTML = `<div class="empty-wrong">✨ 暂无错题，继续保持！</div>`;
        }

        displayQuestions.forEach(q => {
            const div = document.createElement('div');
            div.className = 'question-item';
            div.id = `q-${q.id}`;

            const header = document.createElement('div');
            header.className = 'q-header';
            const statusText = answeredQuestions[q.id] !== undefined ? (answeredQuestions[q.id] === q.answer ? '✅ 回答正确' : '❌ 回答错误') : '⏳ 未作答';
            const statusClass = answeredQuestions[q.id] !== undefined ? (answeredQuestions[q.id] === q.answer ? 'passed' : 'failed') : 'pending';
            header.innerHTML = `<span>Unit ${q.unit} - Question ${q.id}</span><span class="status-badge ${statusClass}">${statusText}</span>`;
            div.appendChild(header);

            const sentence = document.createElement('div');
            sentence.className = 'q-sentence';
            sentence.innerHTML = q.sentence;
            div.appendChild(sentence);

            const trans = document.createElement('div');
            trans.className = 'q-translation';
            trans.textContent = `【译】${q.translation}`;
            div.appendChild(trans);

            const optContainer = document.createElement('div');
            optContainer.className = 'options';
            
            const labels = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                
                let optHtml = `<span>${labels[index]}. ${opt}</span>`;
                if (answeredQuestions[q.id] !== undefined) {
                    optHtml += `<span class="opt-mean">(${q.options_meaning[index]})</span>`;
                }
                btn.innerHTML = optHtml;
                
                btn.dataset.qid = q.id;
                btn.dataset.index = index;

                if (answeredQuestions[q.id] !== undefined) {
                    btn.classList.add('disabled');
                    const userChoice = answeredQuestions[q.id];
                    if (index === q.answer) {
                        btn.classList.add('correct');
                    } else if (index === userChoice && userChoice !== q.answer) {
                        btn.classList.add('wrong');
                    } else if (index === q.answer && userChoice !== q.answer) {
                        btn.classList.add('show-answer');
                    }
                }

                btn.addEventListener('click', () => handleAnswer(q.id, index));
                optContainer.appendChild(btn);
            });
            div.appendChild(optContainer);
            container.appendChild(div);
        });

        let totalCompleted = 0, totalCorrect = 0;
        for (let id in answeredQuestions) {
            const qData = questions.find(q => q.id === parseInt(id));
            if (qData) {
                totalCompleted++;
                if (answeredQuestions[id] === qData.answer) totalCorrect++;
            }
        }
        completedSpan.textContent = totalCompleted;
        correctSpan.textContent = totalCorrect;
        wrongCountSpan.textContent = wrongIds.size;
        btnWrong.innerHTML = `❌ 错题本 (<span id="wrong-count">${wrongIds.size}</span>)`;
    }

    function handleAnswer(qId, selectedIndex) {
        if (answeredQuestions.hasOwnProperty(qId)) return;
        const qData = questions.find(q => q.id === qId);
        if (!qData) return;

        answeredQuestions[qId] = selectedIndex;
        if (selectedIndex !== qData.answer) {
            wrongIds.add(qId);
        }
        renderQuestions(); 
    }

    function switchMode(mode) {
        currentMode = mode;
        btnAll.classList.remove('active');
        btnWrong.classList.remove('active');
        if (mode === 'all') {
            btnAll.classList.add('active');
        } else {
            btnWrong.classList.add('active');
        }
        renderQuestions();
    }

    function resetWrongBook() {
        if (wrongIds.size === 0) {
            alert('当前没有错题！');
            return;
        }
        if (confirm('确定要清空错题本吗？（此操作不会清除已作答记录）')) {
            wrongIds.clear();
            renderQuestions();
        }
    }

    filter.addEventListener('change', renderQuestions);
    renderQuestions();
</script>
