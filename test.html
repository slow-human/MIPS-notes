<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIPS 指令集 · 全题库刷题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app {
            max-width: 1300px;
            width: 100%;
            display: flex;
            gap: 20px;
        }
        /* 主面板 */
        .main-panel {
            flex: 3;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 侧边栏（答题卡） */
        .sidebar {
            flex: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        header {
            padding: 24px 30px 16px;
            border-bottom: 1px solid #edf2f7;
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 14px;
            color: #5e718d;
        }
        .filter-bar {
            padding: 12px 30px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #edf2f7;
        }
        .filter-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #1a3a5c;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .filter-btn.active {
            background: #1a73e8;
            color: white;
        }
        .question-panel {
            padding: 24px 30px 12px;
            background: #fafbfc;
        }
        .category-badge {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 30px;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 500;
            color: #1a2a3a;
            line-height: 1.5;
        }
        .answer-area {
            padding: 20px 30px 30px;
        }
        textarea {
            width: 100%;
            padding: 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            border: 1.5px solid #dde3ed;
            border-radius: 16px;
            min-height: 150px;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
            line-height: 1.5;
        }
        textarea:focus {
            border-color: #1a73e8;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            margin: 20px 0 10px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 14px;
            background: white;
            border: 1px solid #d0dae8;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #1a73e8;
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(26,115,232,0.2);
        }
        .btn-primary:hover {
            background: #1557b0;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .btn-warning {
            background: #fff8e7;
            border-color: #ffc107;
            color: #997404;
        }
        .answer-reveal {
            margin-top: 24px;
            padding: 20px;
            background: #f0f9ff;
            border-radius: 16px;
            border-left: 4px solid #1a73e8;
        }
        .answer-reveal h3 {
            font-size: 15px;
            margin-bottom: 12px;
            color: #0b1e33;
        }
        .answer-content {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            white-space: pre-wrap;
            background: white;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #cbd9eb;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 10px 30px 30px;
        }
        /* 答题卡 */
        .sidebar h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #0b1e33;
        }
        .progress-stats {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        .grid-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
            border: 1px solid transparent;
            font-weight: 500;
        }
        .grid-item.done {
            background: #1a73e8;
            color: white;
        }
        .grid-item.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
        }
        .grid-item.current {
            border: 2px solid #1a73e8;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }
        .sidebar-footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .small-btn {
            padding: 10px;
            border-radius: 30px;
            background: white;
            border: 1px solid #d0dae8;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
        }
        .tip {
            color: #8a9bb5;
            font-size: 12px;
            margin-top: 16px;
        }
        .wrong-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
        }
        .wrong-item {
            padding: 6px 10px;
            background: #fff1f0;
            margin-bottom: 4px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        /* 响应式 */
        @media (max-width: 800px) {
            .app { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 主面板 -->
    <div class="main-panel">
        <header>
            <h1>🧪 MIPS 指令集 · 全题库刷题 <span style="font-size: 16px; font-weight: 400; margin-left: auto;">150 题</span></h1>
            <div class="stats">
                <span id="progressText">第 1 / 150 题</span>
                <span>✅ <span id="doneCount">0</span> 已完成</span>
                <span>📌 <span id="wrongCount">0</span> 错题</span>
            </div>
        </header>

        <!-- 分类筛选 -->
        <div class="filter-bar">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="整数指令">整数指令</button>
            <button class="filter-btn" data-category="宏指令">宏指令</button>
            <button class="filter-btn" data-category="简答题">简答题</button>
            <button class="filter-btn" data-category="wrong">📕 错题本</button>
            <button class="filter-btn" id="randomBtn" style="margin-left: auto;">🎲 随机一题</button>
        </div>

        <div class="question-panel">
            <span class="category-badge" id="categoryTag"></span>
            <div class="question-text" id="questionText"></div>
        </div>

        <div class="answer-area">
            <textarea id="userAnswer" placeholder="在这里输入你的答案……（支持汇编代码）"></textarea>
            <div class="action-bar">
                <button class="btn btn-primary" id="submitBtn">✓ 提交答案</button>
                <button class="btn btn-outline" id="clearBtn">↻ 清空</button>
                <button class="btn btn-outline" id="addWrongBtn">📌 加入错题本</button>
            </div>
            <div class="answer-reveal" id="answerReveal" style="display: none;">
                <h3>📌 参考答案</h3>
                <div class="answer-content" id="referenceAnswer"></div>
                <div style="margin-top: 12px; font-size: 13px; color: #5e718d;" id="compareHint"></div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="btn btn-outline" id="prevBtn">← 上一题</button>
            <button class="btn btn-outline" id="nextBtn">下一题 →</button>
        </div>
    </div>

    <!-- 侧边栏（答题卡） -->
    <div class="sidebar">
        <h3>📋 答题卡</h3>
        <div class="progress-stats">
            <div>完成度: <span id="progressPercent">0%</span></div>
            <div style="margin-top: 8px;">错题: <span id="sidebarWrongCount">0</span> 道</div>
        </div>
        <div class="grid" id="questionGrid"></div>
        <div class="sidebar-footer">
            <button class="small-btn" id="resetProgressBtn">🔄 清空进度</button>
            <button class="small-btn" id="exportWrongBtn">📤 导出错题</button>
        </div>
        <div class="tip">
            💡 点击格子跳转 · Ctrl+Enter 提交<br>
            ←/→ 切换题目
        </div>
        <div id="wrongListContainer" style="margin-top: 16px;"></div>
    </div>
</div>

<script>
    // ---------- 完整题库 150 题 ----------
    const fullQuestions = [
        // === 整数指令 (47) ===
        { category: "整数指令", question: "写出 lb 指令的格式、类型和功能。", answer: "lb rt, offset(rs)  [I型]\nrs + 符号扩展(offset) → 有效地址，从内存读取1字节，符号扩展后加载到rt。" },
        { category: "整数指令", question: "写出 lbu 指令的格式、类型和功能。", answer: "lbu rt, offset(rs)  [I型]\nrs + 符号扩展(offset) → 有效地址，从内存读取1字节，0扩展后加载到rt。" },
        { category: "整数指令", question: "lh 指令有什么对齐要求？若地址为奇数会发生什么？", answer: "lh rt, offset(rs)  [I型]\n要求地址为2的倍数。若地址为奇数，发生地址错误异常。" },
        { category: "整数指令", question: "写出 lhu 指令的功能，以及与 lh 的区别。", answer: "lhu rt, offset(rs)  [I型]\n读取半字，0扩展。lh 是符号扩展。" },
        { category: "整数指令", question: "lw 指令有什么对齐要求？", answer: "lw rt, offset(rs)  [I型]\n地址必须为4的倍数，否则发生地址错误异常。" },
        { category: "整数指令", question: "写出 lui 指令的格式和操作。", answer: "lui rt, imm  [I型]\nrt = imm << 16 | 0x0000。将16位立即数左移16位，低16位补0，存入rt。" },
        { category: "整数指令", question: "写出 sb 指令的格式和功能。", answer: "sb rt, offset(rs)  [I型]\n有效地址 = rs + 符号扩展(offset)，将rt最低8位存入内存。" },
        { category: "整数指令", question: "写出 sh 指令的格式和功能。", answer: "sh rt, offset(rs)  [I型]\n有效地址 = rs + 符号扩展(offset)，将rt低16位存入内存（地址必须2的倍数）。" },
        { category: "整数指令", question: "写出 sw 指令的格式和功能。", answer: "sw rt, offset(rs)  [I型]\n有效地址 = rs + 符号扩展(offset)，将rt全部32位存入内存（地址必须4的倍数）。" },
        { category: "整数指令", question: "mfhi 和 mflo 是什么格式？分别有什么作用？", answer: "mfhi rd  [R型]：HI → rd\nmflo rd  [R型]：LO → rd" },
        { category: "整数指令", question: "mthi 和 mtlo 是什么格式？分别有什么作用？", answer: "mthi rs  [R型]：rs → HI\nmtlo rs  [R型]：rs → LO" },
        { category: "整数指令", question: "写出 add 指令的格式、类型和功能。", answer: "add rd, rs, rt  [R型]\nrs + rt → rd，可能检查补码溢出。" },
        { category: "整数指令", question: "addu 与 add 的区别是什么？", answer: "addu rd, rs, rt  [R型]\n不检查补码溢出，一般用于地址运算。" },
        { category: "整数指令", question: "写出 addi 指令的格式和功能。", answer: "addi rt, rs, imm  [I型]\nrs + 符号扩展(imm) → rt，可能检查溢出。" },
        { category: "整数指令", question: "addiu 中的立即数是如何扩展的？u 代表什么？", answer: "addiu rt, rs, imm  [I型]\n立即数仍进行符号扩展。u 代表不检查溢出，且将最高位视为数值位。" },
        { category: "整数指令", question: "写出 sub 指令的格式和功能。", answer: "sub rd, rs, rt  [R型]\nrs - rt → rd，可能检查溢出。" },
        { category: "整数指令", question: "subu 与 sub 的区别是什么？", answer: "subu rd, rs, rt  [R型]\n不检查溢出。" },
        { category: "整数指令", question: "mult 指令的结果存放在哪里？如何取出？", answer: "mult rs, rt  [R型]\n64位积：高32位→HI，低32位→LO。使用 mfhi / mflo 取出。" },
        { category: "整数指令", question: "multu 与 mult 的区别是什么？", answer: "multu rs, rt  [R型]\n操作数视为无符号正数，其余同 mult。" },
        { category: "整数指令", question: "div 指令的商和余数分别存放在哪个寄存器？", answer: "div rs, rt  [R型]\n商 → LO，余数 → HI。操作数符号相反时商为负；余数符号与被除数相同。" },
        { category: "整数指令", question: "divu 与 div 的区别是什么？", answer: "divu rs, rt  [R型]\n操作数视为无符号数，商和余数恒为正。" },
        { category: "整数指令", question: "写出 and 指令的格式和功能。", answer: "and rd, rs, rt  [R型]\nrs 与 rt 按位与 → rd。" },
        { category: "整数指令", question: "andi 指令的立即数是如何扩展的？", answer: "andi rt, rs, imm  [I型]\n立即数0扩展至32位后与 rs 按位与。" },
        { category: "整数指令", question: "写出 or 指令的格式和功能。", answer: "or rd, rs, rt  [R型]\nrs 与 rt 按位或 → rd。" },
        { category: "整数指令", question: "ori 指令通常和哪个指令配合构造32位立即数？", answer: "ori rt, rs, imm  [I型]\n与 lui 配合：lui 加载高16位，ori 填充低16位。" },
        { category: "整数指令", question: "写出 nor 指令的格式和功能。", answer: "nor rd, rs, rt  [R型]\nrs 与 rt 按位或后取反 → rd。" },
        { category: "整数指令", question: "写出 xor 指令的格式和功能。", answer: "xor rd, rs, rt  [R型]\nrs 与 rt 按位异或 → rd。" },
        { category: "整数指令", question: "xori 指令的立即数扩展方式？", answer: "xori rt, rs, imm  [I型]\n立即数0扩展后与 rs 按位异或。" },
        { category: "整数指令", question: "写出 sll 指令的格式和功能。", answer: "sll rd, rt, sa  [R型]\nrt 左移 sa 位，空位补0 → rd。" },
        { category: "整数指令", question: "sllv 与 sll 的区别是什么？", answer: "sllv rd, rt, rs  [R型]\n移位量取自 rs 的低5位，而不是固定的 sa 字段。" },
        { category: "整数指令", question: "写出 srl 指令的格式和功能。", answer: "srl rd, rt, sa  [R型]\nrt 逻辑右移 sa 位，空位补0 → rd。" },
        { category: "整数指令", question: "写出 srlv 指令的格式和功能。", answer: "srlv rd, rt, rs  [R型]\nrt 逻辑右移 rs 低5位指定的位数，空位补0。" },
        { category: "整数指令", question: "写出 sra 指令的格式和功能。", answer: "sra rd, rt, sa  [R型]\nrt 算术右移 sa 位，空位用符号位填充 → rd。" },
        { category: "整数指令", question: "写出 srav 指令的格式和功能。", answer: "srav rd, rt, rs  [R型]\nrt 算术右移 rs 低5位指定的位数，空位用符号位填充。" },
        { category: "整数指令", question: "为什么没有算术左移指令？", answer: "逻辑左移和算术左移效果完全一致（最低位补0，符号位自然移出），因此无需单独设计，直接用 sll / sllv 即可。" },
        { category: "整数指令", question: "写出 slt 指令的格式和功能。", answer: "slt rd, rs, rt  [R型]\n若 rs < rt（有符号），rd 置1，否则置0。" },
        { category: "整数指令", question: "sltu 与 slt 的区别是什么？", answer: "sltu rd, rs, rt  [R型]\n比较时视为无符号数。" },
        { category: "整数指令", question: "写出 slti 指令的格式和功能。", answer: "slti rt, rs, imm  [I型]\n若 rs < 符号扩展的立即数（有符号），rt 置1，否则置0。" },
        { category: "整数指令", question: "写出 sltiu 指令的格式和功能。", answer: "sltiu rt, rs, imm  [I型]\n若 rs < 符号扩展的立即数（无符号），rt 置1，否则置0。" },
        { category: "整数指令", question: "j 指令的跳转地址是如何形成的？", answer: "j label  [J型]\nPC高4位拼接 (26位立即数左移2位) → PC。" },
        { category: "整数指令", question: "jal 指令除了跳转还做了什么？返回地址存在哪？", answer: "jal label  [J型]\n将 PC+4 存入 $ra，然后跳转到 label。" },
        { category: "整数指令", question: "jalr 指令的格式和功能。", answer: "jalr rd, rs  [R型]\n将返回地址（PC+4）存入 rd，然后跳转至 rs 中的地址。" },
        { category: "整数指令", question: "jr 指令的格式和用途。", answer: "jr rs  [R型]\n跳转到 rs 中的地址。常用于函数返回：jr $ra。" },
        { category: "整数指令", question: "beq 指令的格式和跳转地址计算方式。", answer: "beq rs, rt, label  [I型]\n若 rs == rt，则 PC = PC + 4 + (imm<<2)。" },
        { category: "整数指令", question: "bne 指令的格式和功能。", answer: "bne rs, rt, label  [I型]\n若 rs != rt，跳转至 label。" },
        { category: "整数指令", question: "bgez 指令的功能。", answer: "bgez rs, label  [I型]\n若 rs >= 0，跳转至 label。" },
        { category: "整数指令", question: "bgezal 指令的功能。", answer: "bgezal rs, label  [I型]\n若 rs >= 0，将返回地址存入 $ra 后跳转。" },
        { category: "整数指令", question: "bgtz 指令的功能。", answer: "bgtz rs, label  [I型]\n若 rs > 0，跳转。" },
        { category: "整数指令", question: "blez 指令的功能。", answer: "blez rs, label  [I型]\n若 rs <= 0，跳转。" },
        { category: "整数指令", question: "bltz 指令的功能。", answer: "bltz rs, label  [I型]\n若 rs < 0，跳转。" },
        { category: "整数指令", question: "bltzal 指令的功能。", answer: "bltzal rs, label  [I型]\n若 rs < 0，将返回地址存入 $ra 后跳转。" },
        { category: "整数指令", question: "syscall 指令属于哪种格式？使用前需要设置什么？", answer: "syscall  [R型]\n使用前将系统调用号存入 $v0，参数存入 $a0~$a3。" },

        // === 宏指令 (38) ===
        { category: "宏指令", question: "写出 abs rd, rs 的机器指令展开。", answer: "addu rd, $zero, rs\nbgez rs, 1f\nsub rd, $zero, rs\n1:" },
        { category: "宏指令", question: "写出 beqz rs, label 的展开。", answer: "beq rs, $zero, label" },
        { category: "宏指令", question: "写出 bge rs, rt, label 的展开。", answer: "slt $at, rs, rt\nbeq $at, $zero, label" },
        { category: "宏指令", question: "写出 bgeu rs, rt, label 的展开。", answer: "sltu $at, rs, rt\nbeq $at, $zero, label" },
        { category: "宏指令", question: "写出 bgt rs, rt, label 的展开。", answer: "slt $at, rt, rs\nbne $at, $zero, label" },
        { category: "宏指令", question: "写出 bgtu rs, rt, label 的展开。", answer: "sltu $at, rt, rs\nbne $at, $zero, label" },
        { category: "宏指令", question: "写出 ble rs, rt, label 的展开。", answer: "slt $at, rt, rs\nbeq $at, $zero, label" },
        { category: "宏指令", question: "写出 bleu rs, rt, label 的展开。", answer: "sltu $at, rt, rs\nbeq $at, $zero, label" },
        { category: "宏指令", question: "写出 blt rs, rt, label 的展开。", answer: "slt $at, rs, rt\nbne $at, $zero, label" },
        { category: "宏指令", question: "写出 bltu rs, rt, label 的展开。", answer: "sltu $at, rs, rt\nbne $at, $zero, label" },
        { category: "宏指令", question: "写出 bnez rs, label 的展开。", answer: "bne rs, $zero, label" },
        { category: "宏指令", question: "写出 b label 的两种展开方式。", answer: "bgez $zero, label  或  beq $zero, $zero, label" },
        { category: "宏指令", question: "写出 div rd, rs, rt 的展开。", answer: "bne rt, $zero, ok\nbreak $zero\nok:\ndiv rs, rt\nmflo rd" },
        { category: "宏指令", question: "写出 divu rd, rs, rt 的展开。", answer: "bne rt, $zero, ok\nbreak $zero\nok:\ndivu rs, rt\nmflo rd" },
        { category: "宏指令", question: "写出 la rd, label 的展开。", answer: "lui $at, %hi(label)\nori rd, $at, %lo(label)" },
        { category: "宏指令", question: "写出 li rd, value (value ≥ 32768 或负数) 的展开。", answer: "lui $at, %hi(value)\nori rd, $at, %lo(value)" },
        { category: "宏指令", question: "写出 li rd, value (value < 32768) 的展开。", answer: "ori rd, $zero, value" },
        { category: "宏指令", question: "写出 move rd, rs 的展开。", answer: "addu rd, $zero, rs" },
        { category: "宏指令", question: "写出 mul rd, rs, rt 的展开。", answer: "mult rs, rt\nmflo rd" },
        { category: "宏指令", question: "写出 mulo rd, rs, rt 的展开。", answer: "mult rs, rt\nmfhi $at\nmflo rd\nsra rd, rd, 31\nbeq $at, rd, ok\nbreak $zero\nok:\nmflo rd" },
        { category: "宏指令", question: "写出 mulou rd, rs, rt 的展开。", answer: "multu rs, rt\nmfhi $at\nbeq $at, $zero, ok\nbreak $zero\nok:\nmflo rd" },
        { category: "宏指令", question: "写出 neg rd, rs 的展开。", answer: "sub rd, $zero, rs" },
        { category: "宏指令", question: "写出 negu rd, rs 的展开。", answer: "subu rd, $zero, rs" },
        { category: "宏指令", question: "写出 nop 的展开。", answer: "or $zero, $zero, $zero  （或 sll $zero, $zero, 0）" },
        { category: "宏指令", question: "写出 not rd, rs 的展开。", answer: "nor rd, rs, $zero" },
        { category: "宏指令", question: "写出 rem rd, rs, rt 的展开。", answer: "bne rt, $zero, ok\nbreak $zero\nok:\ndiv rs, rt\nmfhi rd" },
        { category: "宏指令", question: "写出 remu rd, rs, rt 的展开。", answer: "bne rt, $zero, ok\nbreak $zero\nok:\ndivu rs, rt\nmfhi rd" },
        { category: "宏指令", question: "写出 rol rd, rs, rt (变量移位) 的展开。", answer: "subu $at, $zero, rt\nsrlv $at, rs, $at\nsllv rd, rs, rt\nor rd, rd, $at" },
        { category: "宏指令", question: "写出 rol rd, rs, sa (固定移位) 的展开。", answer: "srl $at, rs, 32-sa\nsll rd, rs, sa\nor rd, rd, $at" },
        { category: "宏指令", question: "写出 ror rd, rs, rt (变量移位) 的展开。", answer: "subu $at, $zero, rt\nsllv $at, rs, $at\nsrlv rd, rs, rt\nor rd, rd, $at" },
        { category: "宏指令", question: "写出 ror rd, rs, sa (固定移位) 的展开。", answer: "sll $at, rs, 32-sa\nsrl rd, rs, sa\nor rd, rd, $at" },
        { category: "宏指令", question: "写出 seq rd, rs, rt 的展开。", answer: "beq rt, rs, yes\nori rd, $zero, 0\nbeq $zero, $zero, skip\nyes:\nori rd, $zero, 1\nskip:" },
        { category: "宏指令", question: "写出 sge rd, rs, rt 的展开。", answer: "bne rt, rs, yes\nori rd, $zero, 1\nbeq $zero, $zero, skip\nyes:\nslt rd, rt, rs\nskip:" },
        { category: "宏指令", question: "写出 sgeu rd, rs, rt 的展开。", answer: "bne rt, rs, yes\nori rd, $zero, 1\nbeq $zero, $zero, skip\nyes:\nsltu rd, rt, rs\nskip:" },
        { category: "宏指令", question: "写出 sgt rd, rs, rt 的展开。", answer: "slt rd, rt, rs" },
        { category: "宏指令", question: "写出 sgtu rd, rs, rt 的展开。", answer: "sltu rd, rt, rs" },
        { category: "宏指令", question: "写出 sle rd, rs, rt 的展开。", answer: "bne rt, rs, yes\nori rd, $zero, 1\nbeq $zero, $zero, skip\nyes:\nslt rd, rs, rt\nskip:" },
        { category: "宏指令", question: "写出 sleu rd, rs, rt 的展开。", answer: "bne rt, rs, yes\nori rd, $zero, 1\nbeq $zero, $zero, skip\nyes:\nsltu rd, rs, rt\nskip:" },
        { category: "宏指令", question: "写出 sne rd, rs, rt 的展开。", answer: "beq rt, rs, yes\nori rd, $zero, 1\nbeq $zero, $zero, skip\nyes:\nori rd, $zero, 0\nskip:" },

        // === 简答题 (65) ===
        { category: "简答题", question: "Q1：和高级语言相比，低级语言有何优缺点？", answer: "优点：执行效率高，能够直接访问系统接口。程序体积小，适合嵌入式。能够实现底层操作（上下文切换、中断）。\n缺点：可读性差，开发效率低，维护困难。与硬件强相关，移植性差。易出错且调试困难。" },
        { category: "简答题", question: "Q2：为何需要学习汇编语言？", answer: "深入了解计算机程序执行过程，理解底层工作原理；直观感受CPU结构和指令执行；帮助调试和优化高级语言程序；编写操作系统、驱动、嵌入式系统；逆向工程和漏洞分析。" },
        { category: "简答题", question: "Q3：汇编源程序和汇编程序分别是什么？", answer: "汇编源程序：使用汇编语言编写的程序。汇编程序：将汇编源程序翻译成机器码的工具软件（如 MARS, SPIM, GNU as），也叫汇编器。" },
        { category: "简答题", question: "Q4：根据机器指令体系，CPU 分为哪两大类？典型代表有哪些？", answer: "CISC（复杂指令集计算机）：x86（Intel、AMD）。RISC（精简指令集计算机）：MIPS、ARM、RISC-V。" },
        { category: "简答题", question: "架构 Q1：学习 MIPS 架构需要了解哪四个主要方面的内容？", answer: "1. 各类寄存器（通用、专用HI/LO、特殊PC/IR）。2. 指令集与指令格式（R/I/J字段）。3. 内存寻址模式（立即数、寄存器、基址偏移、伪直接、相对）。4. 数据类型与存储格式（字节/半字/字，大小端对齐）。" },
        { category: "简答题", question: "架构 Q2：数据类型和高级语言中的数据类型有何不同？", answer: "高级语言数据类型带有语义和检查（如不能把float当指针）。汇编语言只是二进制位串的长度约定，硬件不检查类型匹配。" },
        { category: "简答题", question: "架构 Q3：MIPS 架构中通用寄存器有多少个？一个寄存器多少位？", answer: "32个通用寄存器（$0~$31），每个32位（4字节）。" },
        { category: "简答题", question: "架构 Q4：用于传递函数输入实参的寄存器是哪些？", answer: "$a0~$a3（4~7号）。超过4个参数时，其余通过堆栈传递。" },
        { category: "简答题", question: "架构 Q5：用于存放函数返回值的寄存器是哪些？", answer: "$v0~$v1（2~3号）。通常32位返回值仅用$v0，64位用$v0和$v1。" },
        { category: "简答题", question: "架构 Q6：Main 调用 A，Main 中 t0 存有重要值，A 会修改 t0，如何保证 t0 不被改变？", answer: "$t0~$t9 是临时寄存器，调用者保存。Main必须在调用前将$t0保存到栈中，返回后恢复。\naddiu $sp, $sp, -4\nsw $t0, 0($sp)\njal A\nlw $t0, 0($sp)\naddiu $sp, $sp, 4" },
        { category: "简答题", question: "架构 Q7：若 Main 使用 s0 存放重要值，该如何做？", answer: "$s0~$s7 是保存寄存器，被调用者保存。Main无需额外保存，A若使用$s0会自己保存恢复。" },
        { category: "简答题", question: "架构 Q8：保留给 OS 使用的寄存器是哪些？保留给汇编程序使用的寄存器是？", answer: "OS保留：$k0, $k1 (26~27)。汇编器保留：$at (1)。" },
        { category: "简答题", question: "架构 Q9：用于存放函数返回地址的寄存器是哪个？存放栈顶地址的寄存器是哪个？", answer: "返回地址：$ra (31)。栈顶地址：$sp (29)。" },
        { category: "简答题", question: "架构 Q10：HI 寄存器用于存放什么数据？LO 寄存器用于存放什么数据？", answer: "HI：乘法结果高32位，或除法余数。LO：乘法结果低32位，或除法商。" },
        { category: "简答题", question: "架构 Q11：简述汇编源程序执行过程？", answer: "1. 编辑 .asm 源文件。2. 汇编：生成目标文件。3. 链接：合并目标文件和库。4. 加载：OS载入内存。5. 执行：CPU逐条取指、译码、执行。" },
        { category: "简答题", question: "架构 Q12：程序计数器寄存器 PC 存放什么值？为何一次递增 4？何时递增？", answer: "存放：当前正在执行指令的地址（或下一条要取的指令）。递增4：MIPS指令固定32位（4字节），按字节编址。递增时机：取指阶段完成后PC+4。" },
        { category: "简答题", question: "架构 Q13：画一个 64KB 的存储器。", answer: "64KB = 2^16字节，地址0x0000~0xFFFF。通常分为：Text段（低地址）、Data段、BSS段、Heap（向上增长）、Stack（向下增长，高地址）。" },
        { category: "简答题", question: "架构 Q14：现有存储器，对齐要求下，取出地址为 0003 的一个字节、0002 的一个半字、0001 的一个字。", answer: "取字节0x0003：对齐无要求，直接读取。取半字0x0002：符合2倍数对齐，读取0x0002和0x0003。取字0x0001：不符合4倍数对齐，引发地址错误异常。" },
        { category: "简答题", question: "架构 Q15：内存分为几个部分？", answer: "1. Text（代码段）2. Data（已初始化数据）3. BSS（未初始化数据）4. Heap（堆，向上增长）5. Stack（栈，向下增长）6. Kernel Space（内核空间）。" },
        { category: "简答题", question: "架构 Q16：指令寄存器 IR 存放什么？MIPS 指令有几种格式？", answer: "IR存放当前正在译码和执行的机器指令（32位）。格式种类：R型、I型、J型三种。" },
        { category: "简答题", question: "架构 Q17：R 指令有几段？举一个指令例子。", answer: "R格式6个字段：op(6) rs(5) rt(5) rd(5) sa(5) funct(6)。例子：add $t0, $t1, $t2 (op=0, funct=32)。" },
        { category: "简答题", question: "架构 Q18：I 指令有几段？举一个指令例子。", answer: "I格式4个字段：op(6) rs(5) rt(5) immediate(16)。例子：lw $t0, 4($sp)。" },
        { category: "简答题", question: "架构 Q19：J 指令有几段？举一个指令例子。", answer: "J格式2个字段：op(6) address(26)。例子：j label。" },
        { category: "简答题", question: "架构 Q20：结合指令动画理解三种格式指令并描述指令执行过程。", answer: "以R型add为例：IF取指→RD译码读寄存器→ALU执行加法→MEM无访存→WB写回rd。I型和J型在地址计算上有区别，但五阶段流水线相同。" },
        { category: "简答题", question: "寻址方式 Q1：操作数寻址方式有哪几种？分别是什么含义？", answer: "1.立即数寻址：操作数在指令中。2.寄存器寻址：操作数在寄存器。3.基址寻址：地址=寄存器+偏移。4.伪直接寻址：PC高4位拼接26位左移2位。5.寄存器间接寻址：地址在寄存器中。6.相对寻址：PC+4+imm<<2。" },
        { category: "简答题", question: "寻址方式 Q2：采用立即数进行操作数寻址的指令是什么格式？采用寄存器进行操作数寻址的指令是什么格式？", answer: "立即数寻址：I格式（addi, ori, lui）。寄存器寻址：R格式（add, sub, and）及部分I格式源操作数。" },
        { category: "简答题", question: "寻址方式 Q3：采用存储单元进行操作数寻址的指令是什么格式？什么写法？可以直接访问内存的指令有哪些？", answer: "格式：I格式。写法：offset(rs)。直接访存指令：lb, lbu, lh, lhu, lw, sb, sh, sw。" },
        { category: "简答题", question: "寻址方式 Q4：为何需要目标地址寻址？", answer: "用于改变程序控制流（跳转和分支）。分为伪直接寻址（j/jal）、寄存器间接寻址、相对寻址（beq等）。" },
        { category: "简答题", question: "寻址方式 Q5：寄存器间接寻址为何称为间接？采用寄存器间接寻址的指令是什么格式？", answer: "间接含义：指令中给出的寄存器不包含操作数本身，而包含操作数的地址。格式：R格式（jr $ra, jalr $t0）。" },
        { category: "简答题", question: "寻址方式 Q6：伪直接寻址为何称为伪？采用伪直接寻址的指令是什么格式？", answer: "称为“伪”：指令中的26位立即数并非完整目标地址，必须与PC高4位拼接。格式：J格式（j, jal）。" },
        { category: "简答题", question: "寻址方式 Q7：相对寻址为何称为相对？采用相对寻址的指令是什么格式？如何计算 Imm？", answer: "称为“相对”：目标地址相对于当前PC。格式：I格式（所有条件分支）。imm = (目标地址 - (PC+4)) >> 2。" },
        { category: "简答题", question: "数据传送类指令 Q8：从内存取数据的指令有哪些？它们是什么种类的指令？", answer: "lb, lbu, lh, lhu, lw。均为I格式。" },
        { category: "简答题", question: "数据传送类指令 Q9：带 u 和不带 u 指令的区别是什么？为何没有 lwu？", answer: "区别：不带u符号扩展，带u零扩展。没有lwu：因为lw本身就是加载32位字，已填满寄存器，无需扩展。" },
        { category: "简答题", question: "数据传送类指令 Q10：把寄存器中数据存放到 Mem 的指令有哪些？它们是什么种类的指令？", answer: "sb, sh, sw。均为I格式。" },
        { category: "简答题", question: "数据传送类指令 Q11：把 HI 寄存器值传送到通用寄存器的指令是什么？该指令是什么格式？把通用寄存器值传送到 LO 寄存器的指令是什么？", answer: "HI→GPR: mfhi rd (R格式)。GPR→LO: mtlo rs (R格式)。" },
        { category: "简答题", question: "数据传送类指令 Q12：什么是宏指令？", answer: "宏指令（伪指令）是汇编器提供的便利助记符，硬件中不存在对应机器码，汇编时展开为真实指令。例如 li $t0, 100 → addiu $t0, $zero, 100。" },
        { category: "简答题", question: "数据传送类指令 Q13：如何把 32 位 Imm 存放到 Mem 中？", answer: "分两步：1. 用lui+ori将32位立即数加载到寄存器。2. 用sw存入内存。\nlui $at, 0x1234\nori $at, $at, 0x5678\nsw $at, 0($t0)" },
        { category: "简答题", question: "数据传送类指令 Q14：如何把 16 位立即数 Imm 存放到 Mem 中？", answer: "用ori或addiu加载到寄存器，再sw存出。\nori $at, $zero, 0x1234\nsw $at, 0($t0)" },
        { category: "简答题", question: "数据传送类指令 Q15：写出宏指令 li $10, 0xfffffff 的实现代码。", answer: "0xfffffff实际是0x0fffffff。\nlui $t0, 0x0fff\nori $t0, $t0, 0xffff" },
        { category: "简答题", question: "数据传送类指令 Q16：通用寄存器之间传送数据的宏指令是什么？其如何实现？", answer: "宏指令：move rd, rs。实现：addu rd, $zero, rs。" },
        { category: "简答题", question: "算数运算类指令 Q17：加法指令包括哪些？分别是什么类型的指令？带 u 和不带 u 有何区别？", answer: "R型：add, addu。I型：addi, addiu。区别：带u不检测溢出，结果截断32位；不带u可能引发溢出异常。" },
        { category: "简答题", question: "算数运算类指令 Q18：减法指令包括哪些？分别是什么类型的指令？", answer: "sub：R型，检测溢出。subu：R型，不检测溢出。没有I型减法。" },
        { category: "简答题", question: "算数运算类指令 Q19：减法指令为何不像加法指令那样有带 XXi 型指令？如何实现减去一个立即数？", answer: "原因：减法可通过加上负数立即数实现，节省编码空间。实现：addiu rt, rs, -imm。" },
        { category: "简答题", question: "算数运算类指令 Q20：与减法指令相关的宏指令有哪些？", answer: "neg rd, rs：sub rd, $zero, rs。negu rd, rs：subu rd, $zero, rs。" },
        { category: "简答题", question: "算数运算类指令 Q21：求补宏指令能否对 -2^31 求补？", answer: "不能。-2^31的补码是0x80000000，其相反数2^31在32位有符号整数中溢出。neg会触发异常。" },
        { category: "简答题", question: "算数运算类指令 Q22：乘/除法指令包括哪些？是什么类型的指令？", answer: "乘法：mult(有符号), multu(无符号) —— R格式。除法：div(有符号), divu(无符号) —— R格式。" },
        { category: "简答题", question: "算数运算类指令 Q23：与乘法指令相关的宏指令有哪些？", answer: "mul rd, rs, rt：mult + mflo。mulo：带溢出检查。mulou：无符号溢出检查。" },
        { category: "简答题", question: "算数运算类指令 Q24：与除法指令相关的宏指令有哪些？", answer: "div rd,rs,rt：div + mflo。divu rd,rs,rt：divu + mflo。rem：div + mfhi。remu：divu + mfhi。" },
        { category: "简答题", question: "逻辑运算类指令 Q25：与运算指令包括哪些？是什么类型的指令？", answer: "and：R型。andi：I型（立即数0扩展）。" },
        { category: "简答题", question: "逻辑运算类指令 Q26：或运算指令包括哪些？是什么类型的指令？", answer: "or：R型。ori：I型（立即数0扩展）。" },
        { category: "简答题", question: "逻辑运算类指令 Q27：异或运算指令包括哪些？是什么类型的指令？", answer: "xor：R型。xori：I型（立即数0扩展）。" },
        { category: "简答题", question: "逻辑运算类指令 Q28：或非指令含义是什么？非运算如何实现？", answer: "或非nor：对rs和rt按位或后取反。非运算：MIPS无not，使用宏指令 not rd, rs 展开为 nor rd, rs, $zero。" },
        { category: "简答题", question: "移位指令 Q29：逻辑左移指令包括哪些？是什么类型的指令？", answer: "sll：固定移位量，R格式。sllv：可变移位量，R格式。" },
        { category: "简答题", question: "移位指令 Q30：逻辑右移指令包括哪些？是什么类型的指令？", answer: "srl：固定移位量，R格式。srlv：可变移位量，R格式。" },
        { category: "简答题", question: "移位指令 Q31：算术右移指令包括哪些？是什么类型的指令？", answer: "sra：固定移位量，R格式。srav：可变移位量，R格式。" },
        { category: "简答题", question: "移位指令 Q32：为何没有算术左移指令？如何实现算术左移？", answer: "逻辑左移和算术左移效果完全一致（最低位补0，符号位自然移出），直接用sll/sllv即可。" },
        { category: "简答题", question: "移位指令 Q33：循环左移宏指令如何实现？", answer: "rol rd, rs, rt：\nsubu $at, $zero, rt\nsrlv $at, rs, $at\nsllv rd, rs, rt\nor rd, rd, $at" },
        { category: "简答题", question: "移位指令 Q34：循环右移宏指令如何实现？", answer: "ror rd, rs, rt：\nsubu $at, $zero, rt\nsllv $at, rs, $at\nsrlv rd, rs, rt\nor rd, rd, $at" },
        { category: "简答题", question: "条件设置指令 Q35：条件设置指令包括哪些？是什么类型的指令？", answer: "R型：slt, sltu。I型：slti, sltiu。" },
        { category: "简答题", question: "条件设置指令 Q36：条件设置宏指令有哪些？", answer: "seq, sne, sgt, sgtu, sge, sgeu, sle, sleu。都基于slt/sltu及分支指令组合。" },
        { category: "简答题", question: "跳转指令 Q37：无条件转移指令包括哪些？是什么类型的指令？", answer: "j, jal：J格式。jr, jalr：R格式。" },
        { category: "简答题", question: "跳转指令 Q38：条件转移指令包括哪些？是什么类型的指令？", answer: "均为I格式。与0比较：bgez, bgezal, bgtz, blez, bltz, bltzal。两寄存器比较：beq, bne。" },
        { category: "简答题", question: "跳转指令 Q39：无条件转移宏指令如何实现？与 j 指令有何不同？", answer: "宏指令 b label：bgez $zero, label 或 beq $zero, $zero, label。不同：b label是相对寻址（±128KB），j label是伪直接寻址（256MB）。" },
        { category: "简答题", question: "跳转指令 Q40：条件转移宏指令包括哪些？如何实现的？", answer: "beqz, bnez, bge, bgeu, bgt, bgtu, ble, bleu, blt, bltu。结合slt/sltu与beq/bne实现。" },
        { category: "简答题", question: "系统调用指令 Q41：系统调用指令是哪个？如何使用该指令？", answer: "指令：syscall（R格式，funct=001100）。使用：$v0放调用号，$a0~$a3放参数，执行syscall。返回值在$v0。" }
    ];

    // ---------- 应用状态 ----------
    let currentQuestions = [...fullQuestions];
    let currentIndex = 0;
    let userAnswers = new Array(fullQuestions.length).fill('');
    let wrongList = new Set(); // 错题索引
    let doneStatus = new Array(fullQuestions.length).fill(false);
    let currentFilter = 'all';

    // DOM 元素
    const questionText = document.getElementById('questionText');
    const categoryTag = document.getElementById('categoryTag');
    const userAnswer = document.getElementById('userAnswer');
    const answerReveal = document.getElementById('answerReveal');
    const referenceAnswer = document.getElementById('referenceAnswer');
    const compareHint = document.getElementById('compareHint');
    const progressText = document.getElementById('progressText');
    const doneCountSpan = document.getElementById('doneCount');
    const wrongCountSpan = document.getElementById('wrongCount');
    const progressPercent = document.getElementById('progressPercent');
    const sidebarWrongCount = document.getElementById('sidebarWrongCount');
    const questionGrid = document.getElementById('questionGrid');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const addWrongBtn = document.getElementById('addWrongBtn');
    const resetProgressBtn = document.getElementById('resetProgressBtn');
    const exportWrongBtn = document.getElementById('exportWrongBtn');
    const randomBtn = document.getElementById('randomBtn');
    const filterBtns = document.querySelectorAll('.filter-btn[data-category]');

    // 更新视图
    function render() {
        const q = currentQuestions[currentIndex];
        const fullIndex = fullQuestions.indexOf(q);
        categoryTag.textContent = `📁 ${q.category}`;
        questionText.textContent = q.question;
        userAnswer.value = userAnswers[fullIndex] || '';
        answerReveal.style.display = 'none';
        updateStats();
        renderGrid();
    }

    function updateStats() {
        const total = currentQuestions.length;
        const done = doneStatus.filter((v, i) => {
            const idx = fullQuestions.indexOf(currentQuestions[i]);
            return v && currentQuestions.includes(fullQuestions[idx]);
        }).length;
        progressText.textContent = `第 ${currentIndex+1} / ${total} 题`;
        doneCountSpan.textContent = done;
        wrongCountSpan.textContent = wrongList.size;
        sidebarWrongCount.textContent = wrongList.size;
        progressPercent.textContent = total ? Math.round((done/total)*100) + '%' : '0%';
    }

    function renderGrid() {
        questionGrid.innerHTML = '';
        currentQuestions.forEach((q, i) => {
            const fullIdx = fullQuestions.indexOf(q);
            const div = document.createElement('div');
            div.className = 'grid-item';
            if (doneStatus[fullIdx]) div.classList.add('done');
            if (wrongList.has(fullIdx)) div.classList.add('wrong');
            if (i === currentIndex) div.classList.add('current');
            div.textContent = i+1;
            div.addEventListener('click', () => {
                currentIndex = i;
                render();
            });
            questionGrid.appendChild(div);
        });
    }

    function applyFilter(category) {
        currentFilter = category;
        if (category === 'all') {
            currentQuestions = [...fullQuestions];
        } else if (category === 'wrong') {
            currentQuestions = fullQuestions.filter((_, idx) => wrongList.has(idx));
        } else {
            currentQuestions = fullQuestions.filter(q => q.category === category);
        }
        if (currentQuestions.length === 0) {
            alert('当前分类没有题目，请切换分类。');
            currentQuestions = [...fullQuestions];
            currentFilter = 'all';
            filterBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-category="all"]').classList.add('active');
        }
        currentIndex = 0;
        render();
        filterBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.category === currentFilter);
        });
    }

    function handleSubmit() {
        const q = currentQuestions[currentIndex];
        const fullIdx = fullQuestions.indexOf(q);
        const ans = userAnswer.value.trim();
        userAnswers[fullIdx] = ans;
        referenceAnswer.textContent = q.answer;
        answerReveal.style.display = 'block';
        if (ans === '') {
            compareHint.textContent = '⚠️ 你还没有输入答案。';
        } else {
            const userLower = ans.toLowerCase().replace(/\s+/g, '');
            const refLower = q.answer.toLowerCase().replace(/\s+/g, '');
            if (userLower === refLower) compareHint.textContent = '✅ 完全正确！';
            else if (refLower.includes(userLower) && userLower.length > 10) compareHint.textContent = '📝 部分正确，可再补充细节。';
            else compareHint.textContent = '🔍 已显示参考答案，请自行对照。';
        }
        doneStatus[fullIdx] = true;
        updateStats();
        renderGrid();
    }

    function handleClear() {
        userAnswer.value = '';
        answerReveal.style.display = 'none';
    }

    function addToWrong() {
        const fullIdx = fullQuestions.indexOf(currentQuestions[currentIndex]);
        wrongList.add(fullIdx);
        updateStats();
        renderGrid();
    }

    function resetProgress() {
        if (confirm('确定清空所有答题记录和错题本吗？')) {
            doneStatus.fill(false);
            wrongList.clear();
            userAnswers.fill('');
            render();
        }
    }

    function exportWrong() {
        const wrongItems = Array.from(wrongList).map(idx => {
            const q = fullQuestions[idx];
            return `【${q.category}】${q.question}\n参考答案：${q.answer}`;
        }).join('\n\n---\n\n');
        const blob = new Blob([wrongItems], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'mips_wrong.txt';
        a.click();
    }

    // 事件绑定
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            applyFilter(btn.dataset.category);
        });
    });
    randomBtn.addEventListener('click', () => {
        if (currentQuestions.length) {
            currentIndex = Math.floor(Math.random() * currentQuestions.length);
            render();
        }
    });
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) { currentIndex--; render(); }
    });
    nextBtn.addEventListener('click', () => {
        if (currentIndex < currentQuestions.length - 1) { currentIndex++; render(); }
    });
    submitBtn.addEventListener('click', handleSubmit);
    clearBtn.addEventListener('click', handleClear);
    addWrongBtn.addEventListener('click', addToWrong);
    resetProgressBtn.addEventListener('click', resetProgress);
    exportWrongBtn.addEventListener('click', exportWrong);

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { prevBtn.click(); e.preventDefault(); }
        if (e.key === 'ArrowRight') { nextBtn.click(); e.preventDefault(); }
        if (e.ctrlKey && e.key === 'Enter') { submitBtn.click(); }
    });

    // 初始化
    render();
</script>
</body>
</html>
